# Crucible local config for E4.
# Local-run usage:
#   cd /Users/eren/Documents/ai/diff-ar-paper-research
#   .venv/bin/crucible run experiment --preset smoke
# Fleet-run usage: see ../parameter-golf_dev/.crucible/projects/diff_ar_e4.yaml

project:
  name: diff-ar-e4
  description: AR vs diffusion vs hybrid CoT on GSM8K — param-golf E4

training:
  - backend: generic
    script: e4/runner.py
    modality: generic

metrics:
  primary: val_loss              # 1.0 - accuracy, so leaderboard min-loss = max-accuracy
  direction: minimize
  also_track: [accuracy, flops_used, k_steps, condition]

presets:
  # Mock smoke: 5 problems, no real models loaded.
  # Lets us verify Crucible parses output correctly before paying for a GPU.
  smoke:
    CONDITION: c3
    K_STEPS: "8"
    N_PROBLEMS: "5"
    AR_MODEL: Qwen/Qwen2.5-0.5B-Instruct
    DIFF_MODEL: GSAI-ML/LLaDA-1.5B-Instruct
    SEED: "0"
    MOCK_MODELS: "1"             # runner emits fake outputs without loading real weights
    MAX_WALLCLOCK_SECONDS: "60"

  # Sanity: 5 problems with real models. ~1-2 minutes on a 4090.
  sanity:
    CONDITION: c1
    N_PROBLEMS: "5"
    AR_MODEL: Qwen/Qwen2.5-0.5B-Instruct
    DIFF_MODEL: GSAI-ML/LLaDA-1.5B-Instruct
    SEED: "0"
    MOCK_MODELS: "0"
    MAX_WALLCLOCK_SECONDS: "300"

  # Screen: 200 problems, single (CONDITION, K_STEPS) tuple.
  # Caller varies CONDITION and K_STEPS via --set across the sweep.
  screen:
    CONDITION: ${CONDITION:c1}
    K_STEPS: ${K_STEPS:0}
    N_PROBLEMS: "200"
    AR_MODEL: Qwen/Qwen2.5-0.5B-Instruct
    DIFF_MODEL: GSAI-ML/LLaDA-1.5B-Instruct
    SEED: "0"
    MOCK_MODELS: "0"
    MAX_WALLCLOCK_SECONDS: "7200"
